<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favorite Person</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:100px;
}

button{
    padding:12px 25px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}

#message{
    margin-top:30px;
    font-size:28px;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>Who is your favorite person?</h1>

<div id="buttons">
    <button onclick="shuffleButtons()"> lamia</button>
    <button onclick="shuffleButtons()">Mes cousines</button>
    <button onclick="goodChoice()">48</button>
</div>

<div id="message"></div>

<script>

function shuffleButtons() {

    let options = [
        '<button onclick="shuffleButtons()">lamia</button>',
        '<button onclick="shuffleButtons()">Mes cousines</button>',
        '<button onclick="goodChoice()">48</button>'
    ];

    options.sort(() => Math.random() - 0.5);

    document.getElementById("buttons").innerHTML =
        options.join("");
}

function goodChoice() {
    document.getElementById("message").innerHTML =
    "🎉 now,You made the right choice!";
}

</script>

</body>
      </html>
